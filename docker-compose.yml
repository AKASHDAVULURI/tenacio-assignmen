version: "3.9"

services:
  app:
    build: .
    container_name: tenacio-app
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/tenacio-db?replicaSet=rs0
    restart: always

  mongo:
    image: mongo:7
    container_name: tenacio-mongo
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27021:27017"   # 👈 UPDATED PORT
    volumes:
      - mongo_data:/data/db
    restart: always

  mongo-init-replica:
    image: mongo:7
    depends_on:
      - mongo
    restart: "no"
    entrypoint: >
      bash -c "
        echo 'Waiting for Mongo...';
        sleep 5;
        mongosh --host mongo:27017 --eval '
          rs.initiate({
            _id: \"rs0\",
            members: [{ _id: 0, host: \"mongo:27017\" }]
          })
        ';
      "

volumes:
  mongo_data: